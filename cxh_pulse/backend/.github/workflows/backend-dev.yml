name: Deploy BE/dev

on:
  push:
    branches:
      - BE/dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROXY_PRIVATE_KEY }}

      - name: SSH to proxy and execute deploy
        id: ssh_deploy
        shell: bash
        continue-on-error: true
        run: |
          set +e

          echo "Starting SSH deployment..."

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.PROXY_VM_IP }} "
              ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
              ${{ secrets.VM_USER }}@${{ secrets.APP_DEV_VM_IP }} '
                ${{ secrets.DEPLOY_BACKEND_FILE_PATH }}'
            "

          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            ERROR_MSG="SSH failed with exit code $STATUS"

            echo "::error::$ERROR_MSG"
            echo "SSH_FAILURE_REASON=$ERROR_MSG" >> "$GITHUB_ENV"

            exit 1
          fi

      - name: Trigger Cloud Run - GitHub Actions Failure
        if: steps.ssh_deploy.outcome == 'failure'
        shell: bash
        run: |
          TIMESTAMP=$(date +%s)

          FAILURE_REASON="$SSH_FAILURE_REASON"

          if [ -z "$FAILURE_REASON" ]; then
            FAILURE_REASON="GitHub Actions SSH failure"
          fi

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"github_actions_failure\",
              \"app\": \"Pulse Dev Backend\",
              \"environment\": \"Development\",
              \"failure_reason\": \"$FAILURE_REASON\",
              \"timestamp\": $TIMESTAMP
            }" \
            "${{ secrets.CLOUD_RUN_ALERT_URL }}"

      - name: Mark workflow as failed
        if: steps.ssh_deploy.outcome == 'failure'
        run: exit 1
