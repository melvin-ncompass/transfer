<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Leaflet Vector Tiles (MBTiles)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid/dist/Leaflet.VectorGrid.bundled.js"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
      }
      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      //  Initialize Leaflet Map
      const map = L.map("map").setView([0, 20], 3);

      // Add OpenStreetMap basemap
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      
      const vectorLayer = L.vectorGrid.protobuf(
        "http://localhost:8080/data/nyc/{z}/{x}/{y}.pbf",
        {
          vectorTileLayerStyles: {
            "nyc_layer": {
              fill: true,
              fillColor: "#4CAF50",
              fillOpacity: 0.5,
              color: "#333",
              weight: 1,
            },
          },
          interactive: true,
          maxNativeZoom: 14,
        }
      );

      vectorLayer.addTo(map);

      // Optional popup on feature click
      vectorLayer.on("click", function (e) {
        const props = e.layer.properties;
        L.popup()
          .setLatLng(e.latlng)
          .setContent(`<pre>${JSON.stringify(props, null, 2)}</pre>`)
          .openOn(map);
      });
    </script>
  </body>
</html>
