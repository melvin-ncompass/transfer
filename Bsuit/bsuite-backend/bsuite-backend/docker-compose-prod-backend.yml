services:
  bsuite-backend:
    container_name: bsuite-backend
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8001:8001"
    volumes:
      - .:/app 
      - /var/www/bsuite/static:/app/static
      - node_modules:/app/node_modules
    env_file:
      - .env
    networks:
      - bsuite-net

networks:
  bsuite-net:
    external: true

volumes:
  node_modules: