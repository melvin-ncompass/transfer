<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your BSuite Account Password</title>
</head>
<body style="font-family: Arial, sans-serif; background: #e9ecef; padding: 40px;">

  <div style="
    max-width: 600px;
    margin: auto;
    background: #ffffff;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid #ddd;
  ">

    <h2 style="color: #333; margin-top: 0;">Your BSuite Account Password</h2>

    <p style="font-size: 15px; color: #555;">
      Hi {{username}},
      <br><br>
      Your account on <strong>BSuite</strong> has been created.
      <br>
      Below is your temporary password:
    </p>

    <div style="
      margin: 20px 0;
      padding: 15px;
      background: #f7f7f7;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      color: #333;
    ">
      {{password}}
    </div>

    <p style="font-size: 15px; color: #555;">
      For security reasons, please log in as soon as possible and change your password.
    </p>

    <a href="{{loginUrl}}"
      style="
        display: inline-block;
        padding: 12px 20px;
        background: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        margin-top: 15px;
        font-size: 15px;
        font-weight: bold;
      ">
      Log In to BSuite
    </a>

    <br><br>

    <p style="font-size: 13px; color: #999; text-align: center;">
      © BSuite by NCompass — All rights reserved.
    </p>

  </div>

</body>
</html>
