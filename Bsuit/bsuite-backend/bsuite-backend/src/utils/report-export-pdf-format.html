<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .company-logo {
      width: 100vw;
      height: 120px;
      overflow: hidden;
    }

    .company-logo img {
      width: 100vw;
      height: 100%;
      object-fit: fill;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px;
      vertical-align: top;
    }

    th {
      background: #f4f4f4;
      text-align: center;
    }

    .left {
      text-align: left;
    }

    .right {
      text-align: right;
    }

    .section {
      font-weight: bold;
      background: #efefef;
    }

    .group {
      font-weight: bold;
    }

    .account {
      padding-left: 16px;
    }

    .total {
      font-weight: bold;
      border-top: 2px solid #000;
    }

    .final {
      font-weight: bold;
      border-top: 3px solid #000;
    }

    .no-data {
      text-align: center;
      font-style: italic;
      color: #999;
      padding: 40px 0;
    }
  </style>
</head>

<body>
  {{#if headerUrl}}
  <div class="company-logo">
    <img src="{{headerUrl}}" alt="Company Logo" />
  </div>
  {{/if}}

  <div class="header">
    <div class="title">PROFIT & LOSS</div>
    <div class="subtitle">{{formattedFromDate}} - {{formattedToDate}}</div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="left">Account / Group</th>
        {{#each headers}}
        <th>{{this}}</th>
        {{/each}}
      </tr>
    </thead>
    <tbody>
      {{#if rows.length}}
        {{#each rows}}
        <tr class="{{rowClass}}">
          <td class="left {{indentClass}}">{{label}}</td>
          {{#each values}}
          <td class="right">{{this}}</td>
          {{/each}}
        </tr>
        {{/each}}
      {{else}}
        <tr>
          <td class="no-data" colspan="{{addOne headers.length}}">No data available</td>
        </tr>
      {{/if}}
    </tbody>
  </table>
</body>

</html>
