<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminder</title>
  <style>
    p {
      color: #555555;
      line-height: 1.6;
      font-size: 16px;
    }
  </style>
</head>

<body style="font-family: Arial, sans-serif; background: #e9ecef; padding: 40px;">

  <!-- Card -->
  <div style="
    max-width: 600px;
    margin: auto;
    background: #ffffff;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid #ddd;
  ">

    <h1 style="margin-bottom: 10px;">Reminder</h1>

    <p>This is a reminder for the following:</p>

    <!-- Subject -->
    <div style="
      margin: 20px 0;
      padding: 15px;
      background: #f7f7f7;
      border-left: 4px solid #007bff;
      border-radius: 6px;
      font-size: 16px;
      color: #333;
    ">
      <strong>{{subject}}</strong>
    </div>

    <br />

    <p style="font-size: 14px; color: #777;">
      You are receiving this notification based on reminder settings.
    </p>

    <p style="font-size: 13px; color: #999; text-align: center; margin-top: 30px;">
      © BSuite by NCompass — All rights reserved.
    </p>

  </div>
  <!-- End Card -->

</body>
</html>
