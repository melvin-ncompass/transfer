<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .company-logo {
      width: 100%;
      height: 85px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .company-logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
    }

    .title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .sub-title {
      text-align: center;
      font-size: 17px;
      margin-top: 2px;
    }

    h1,
    h2,
    h3 {
      text-align: center;
      margin: 4px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      background: #EAEAF1;
      padding: 10px;
      border: 1px solid #ddd;
      font-weight: bold;
      font-size: 16px; 
    }

    td {
      padding: 10px;
      border: 1px solid #ddd;
      font-size: 14px; 
    }

    .gray-line {
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }
  </style>
</head>

<body>
  {{#if companyHeaderUrl}}
  <div class="company-logo">
    <img src="{{companyHeaderUrl}}" alt="Company Header" />
  </div>
  {{/if}}
  <div class="title">{{companyName}}</div>
  <div class="sub-title">{{reportTitle}}</div>
  <div class="sub-title">{{username}}</div>
  {{#if moduleTitle}}
  <div class="sub-title">{{moduleTitle}}</div>
  {{/if}}
  <div class="sub-title">{{featureTitle}}</div>
  <div class="gray-line"></div>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>User</th>
        <th>Username</th>
        <th>Module</th>
        <th>Feature</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {{#each rows}}
      <tr>
        <td>{{this.time}}</td>
        <td>{{this.user}}</td>
        <td>{{this.username}}</td>
        <td>{{this.module}}</td>
        <td>{{this.feature}}</td>
        <td>{{this.status}}</td>
      </tr>
      {{/each}}
    </tbody>
  </table>
</body>

</html>
