<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 10px;
        }

        .footer {
            width: 100%;
            border-top: 1px solid #333;
            padding-top: 4px;
            position: relative;
        }

        .right {
            position: absolute;
            right: 0;
            bottom: 0;
        }

        .center {
            text-align: center;
            width: 100%;
        }
    </style>

    <script>
        function subst() {
            var vars = {};
            var query = document.location.search.substring(1).split('&');

            for (var i = 0; i < query.length; i++) {
                var pair = query[i].split('=');
                vars[pair[0]] = decodeURIComponent(pair[1]);
            }

            var elements = document.getElementsByClassName('page');
            for (var i = 0; i < elements.length; i++) {
                elements[i].textContent = vars.page;
            }

            elements = document.getElementsByClassName('topage');
            for (var i = 0; i < elements.length; i++) {
                elements[i].textContent = vars.topage;
            }
        }
    </script>
</head>

<body onload="subst()">
    <div class="footer">
        <div class="right">
            {{timestamp}}
        </div>

        <div class="center">
            Page <span class="page"></span> of <span class="topage"></span>
        </div>
    </div>
</body>
</html>
