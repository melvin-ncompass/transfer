services:
  bsuite-backend:
    container_name: bsuite-backend
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "${PORT}:8001"
    volumes:
      - node_modules:/app/node_modules
      - ${STATIC_FOLDER_PATH}:/app/static
    env_file:
      - .env
    networks:
      - bsuite-net
    develop:
      watch:
        - path: ./src
          action: sync+restart
          target: /app/src

networks:
  bsuite-net:
    external: true

volumes:
  node_modules:
